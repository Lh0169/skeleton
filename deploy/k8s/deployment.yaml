apiVersion: apps/v1
kind: Deployment
metadata:
  name: skeleton-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skeleton
  template:
    metadata:
      labels:
        app: skeleton
    spec:
      containers:
        - name: app
          image: skeleton:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: skeleton-secret
                  key: db-url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skeleton-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skeleton-secret
                  key: db-password
            - name: REDIS_HOST
              value: redis-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
